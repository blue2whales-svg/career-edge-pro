name: Fetch Jobs

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    steps:
      - name: Fetch Adzuna Jobs
        run: |
          curl -f -s -X POST \
            "${SUPABASE_URL}/functions/v1/fetch-adzuna" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "Adzuna fetch failed"

      - name: Wait 30 seconds
        run: sleep 30

      - name: Fetch Jooble Jobs
        run: |
          curl -f -s -X POST \
            "${SUPABASE_URL}/functions/v1/fetch-jooble" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "Jooble fetch failed"
